services:
  backend:
    build:
      context: ./backend/simpleapi
    environment:
      - SPRING_DATASOURCE_URL
      - SPRING_DATASOURCE_USERNAME
      - SPRING_DATASOURCE_PASSWORD
    networks:
      - proxy-net
      - db-net
    depends_on:
      database:
        condition: service_healthy

  database:
    build:
      context: ./backend/data
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    volumes:
      - tp1-db-data:/var/lib/postgresql/data
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  httpd:
    build:
      context: ./frontend
    ports:
      - "8091:80"
    networks:
      - proxy-net
    depends_on:
      - backend

networks:
  proxy-net:
  db-net:

volumes:
  tp1-db-data:
