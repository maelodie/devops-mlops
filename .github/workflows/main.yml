name: CI devops 2026

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-backend:
    name: Stage 1 - Test backend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend/simpleapi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/simpleapi/pom.xml

      - name: Build and test with Maven
        run: mvn --batch-mode clean verify

  sonar-quality-gate:
    name: Stage 2 - Sonar quality scan
    environment: dev
    needs: test-backend
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref_name == 'main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/simpleapi/pom.xml

      - name: Sonar Scan
        run: >-
          mvn -B -f backend/simpleapi/pom.xml verify sonar:sonar
          -Dsonar.projectKey=maelodie_devops-mlops
          -Dsonar.organization=maelodie
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  build-and-push-docker-image:
    name: Stage 3 - Build and push Docker images
    environment: dev
    needs:
      - test-backend
      - sonar-quality-gate
    runs-on: ubuntu-24.04
    if: always() && github.event_name == 'push' && github.ref_name == 'main' && needs.test-backend.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: tp1-backend
            context: ./backend/simpleapi
          - name: tp1-postgres
            context: ./backend/data
          - name: tp1-frontend
            context: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/${{ matrix.image.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ansible:
    name: Stage 4 - Update server with Ansible
    environment: ansible-prod
    needs: build-and-push-docker-image
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref_name == 'main' && needs.build-and-push-docker-image.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Install Ansible Docker collection
        run: ansible-galaxy collection install community.docker

      - name: Configure SSH key permissions for deployment
        run: chmod 600 id_rsa

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i project/ansible/inventories/setup.yml \
            project/ansible/playbook.yml \
            -e "ansible_ssh_private_key_file=${{ github.workspace }}/id_rsa" \
            -e "app_image=${{ secrets.DOCKERHUB_USER }}/tp1-backend:latest" \
            -e "database_image=${{ secrets.DOCKERHUB_USER }}/tp1-postgres:latest" \
            -e "proxy_image=${{ secrets.DOCKERHUB_USER }}/tp1-frontend:latest"
