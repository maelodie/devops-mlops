name: CI devops 2026

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend/simpleapi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/simpleapi/pom.xml

      - name: Build and test with Maven
        run: mvn --batch-mode clean verify

  build-and-push-docker-image:
    environment: dev
    needs: test-backend
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
    
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/simpleapi
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/tp1-backend:latest
    
      - name: Build and push database image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/data
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/tp1-postgres:latest
    
      - name: Build and push httpd image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/tp1-frontend:latest
      
      - name: Sonar Scan
        run: mvn -B -f backend/simpleapi/pom.xml verify sonar:sonar -Dsonar.projectKey=maelodie_devops-mlops -Dsonar.organization=maelodie -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }}
